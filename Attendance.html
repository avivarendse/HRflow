<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
  <title>HRflow</title>
</head>

<body>

<div class="d-flex">

  <!-- ================= SIDEBAR (Bootstrap collapse on mobile) ================= -->
  <div class="collapse d-lg-block bg-light border-end vh-100 p-3"
       id="sidebar">

    <h5 class="fw-bold mb-4">HRflow</h5>

    <ul class="nav nav-pills flex-column gap-1">

      <li class="nav-item"><a class="nav-link active" href="#">Dashboard</a></li>
      <li class="nav-item"><a class="nav-link" href="#">Employees</a></li>
      <li class="nav-item"><a class="nav-link" href="#">Payroll</a></li>
      <li class="nav-item"><a class="nav-link" href="#">Leave</a></li>
      <li class="nav-item"><a class="nav-link" href="#">Attendance</a></li>
      <li class="nav-item"><a class="nav-link" href="#">Reports</a></li>
      <li class="nav-item"><a class="nav-link" href="#">Settings</a></li>

    </ul>

  </div>
    <!-- ================= MAIN AREA ================= -->
     <body>

<div class="container-fluid">

  <div class="row">

    <!-- Sidebar -->
    
        <li class="nav-item">
          <a class="nav-link" href="#">
            <i class="fa-solid fa-gear me-2"></i> Settings
          </a>
        </li>

      </ul>

    </aside>

    <!-- Main Content -->
    <main class="col-lg-10 bg-body-tertiary min-vh-100">


        <form class="d-flex flex-grow-1 mx-lg-3">

          <div class="input-group">

            <span class="input-group-text bg-white border-end-0">
              <i class="fa-solid fa-magnifying-glass"></i>
            </span>

            <input
              class="form-control border-start-0"
              type="search"
              placeholder="Search employees, payroll, requests..."
            >

          </div>

        </form>

        <div class="d-flex align-items-center gap-3">

          <button class="btn position-relative">

            <i class="fa-regular fa-bell fs-5"></i>

            <span class="position-absolute top-0 start-100 translate-middle p-1 bg-danger border border-light rounded-circle"></span>

          </button>

          <div
            class="rounded-circle bg-primary text-white d-flex justify-content-center align-items-center"
            style="width:42px;height:42px;font-weight:600;">

            PR

          </div>

        </div>

      </nav>

      <!-- Attendance Header -->
      <div class="d-flex justify-content-between align-items-center mt-4">

        <div>

          <h2 class="fw-bold mb-1">Attendance</h2>

          <p class="text-secondary mb-0">
            Daily presence, absences and monthly trends.
          </p>

        </div>

        <button class="btn btn-light shadow-sm rounded-pill px-4">

          <i class="fa-solid fa-download me-2"></i>

          Export CSV

        </button>

      </div>

      <!-- Cards Row -->
      <div class="row g-4 mt-2">

        <div class="col-md-6">

          <div class="card border-0 shadow-sm rounded-4 p-4">

            <span class="badge text-bg-success rounded-pill px-3 py-2 align-self-start">
              Present today
            </span>

            <h1 class="mt-4 fw-bold">7</h1>

            <p class="text-secondary">of 10</p>

          </div>

        </div>

        <div class="col-md-6">

          <div class="card border-0 shadow-sm rounded-4 p-4">

            <span class="badge text-bg-danger rounded-pill px-3 py-2 align-self-start">
              Absent today
            </span>

            <h1 class="mt-4 fw-bold">1</h1>

            <p class="text-secondary">needs follow-up</p>

          </div>

        </div>

      </div>

    </main>

  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

</body>
