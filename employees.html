<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HRflow | Employees</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <script>
      if (localStorage.getItem("darkMode") === "true") {
        document.body.classList.add("dark-mode");
      }
    </script>
    <div id="wrapper">
      <aside id="sidebar">
        <div class="sidebar-header">
          <div class="sidebar-logo-box">
            <i class="bi bi-buildings-fill"></i>
          </div>
          <div class="sidebar-brand-text">
            <span class="brand-name">HR<span>Flow</span></span>
            <span class="brand-sub">Modern HR Platform</span>
          </div>
        </div>
        <ul class="sidebar-menu">
          <li class="sidebar-item">
            <a class="sidebar-link" href="dashboard.html">
              <i class="bi bi-grid-1x2-fill"></i><span>Dashboard</span>
            </a>
          </li>
          <li class="sidebar-item">
            <a class="sidebar-link active" href="employees.html">
              <i class="bi bi-people-fill"></i><span>Employees</span>
            </a>
          </li>
          <li class="sidebar-item">
            <a class="sidebar-link" href="payroll.html">
              <i class="bi bi-cash-stack"></i><span>Payroll</span>
            </a>
          </li>
          <li class="sidebar-item">
            <a class="sidebar-link" href="Performance.html">
              <i class="bi bi-calendar-check"></i><span>Performance</span>
            </a>
          </li>
          <li class="sidebar-item">
            <a class="sidebar-link" href="leave.html">
              <i class="bi bi-calendar2-x"></i><span>Leave</span>
            </a>
          </li>
          <li class="sidebar-item">
            <a class="sidebar-link" href="reports.html">
              <i class="bi bi-bar-chart-line-fill"></i><span>Reports</span>
            </a>
          </li>
          <li class="sidebar-item">
            <a class="sidebar-link" href="settings.html">
              <i class="bi bi-gear-fill"></i><span>Settings</span>
            </a>
          </li>
        </ul>
        <div class="sidebar-footer"></div>
      </aside>

      <main id="page-content-wrapper">
        <div class="content-topbar">
          <div class="page-titles">
            <button
              class="btn btn-sm btn-custom-outline mobile-menu-btn mb-2"
              id="mobile-toggle"
            >
              <i class="bi bi-list"></i>
            </button>
            <h1>Employees</h1>
            <p>Manage and view team directory configurations.</p>
          </div>
          <div class="topbar-tools">
            <button class="theme-toggle-btn" id="themeToggleBtn" type="button" title="Toggle dark mode">
              <i class="bi bi-moon-fill"></i>
            </button>
            <button class="btn btn-success me-2" data-bs-toggle="modal" data-bs-target="#addEmployeeModal">
              <i class="bi bi-person-plus-fill"></i> Add Employee
            </button>
            <button class="btn btn-custom btn-custom-primary" id="exportBtn">
              <i class="bi bi-download"></i> Export CSV
            </button>
            <div class="topbar-datetime" id="topbarDatetime">
              <div class="t-date">--</div>
              <div class="t-time">--</div>
            </div>
          </div>
        </div>

        <div class="main-container">
          <div class="card card-custom">
            <div class="card-body">
              <h5 class="fw-bold mb-3 text-primary">Master Directory</h5>
              <div class="table-responsive">
                <table class="table custom-table-styles align-middle">
                  <thead>
                    <tr>
                      <th>Employee Name</th>
                      <th>ID</th>
                      <th>Department</th>
                      <th>Role Profile</th>
                      <th>Email Address</th>
                      <th class="text-end">Actions</th>
                    </tr>
                  </thead>
                  <tbody id="EmployeesTable">
                  </tbody>
                </table>
              </div>
            </div>
          </div>
        </div>
      </main>
    </div>

    <div class="modal fade" id="addEmployeeModal" tabindex="-1" aria-labelledby="addEmployeeModalLabel" aria-hidden="true">
      <div class="modal-dialog">
        <div class="modal-content text-dark">
          <div class="modal-header">
            <h5 class="modal-title fw-bold" id="addEmployeeModalLabel">Onboard New Employee</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body">
            <form id="addEmployeeForm">
              <div class="mb-3">
                <label for="empName" class="form-label">Full Name</label>
                <input type="text" class="form-control" id="empName" required placeholder="e.g. Sarah Jenkins">
              </div>
              <div class="mb-3">
                <label for="empId" class="form-label">Employee ID</label>
                <input type="text" class="form-control" id="empId" required placeholder="e.g. 11">
              </div>
              <div class="mb-3">
                <label for="empDept" class="form-label">Department</label>
                <input type="text" class="form-control" id="empDept" required placeholder="e.g. Marketing">
              </div>
              <div class="mb-3">
                <label for="empRole" class="form-label">Job Title / Role</label>
                <input type="text" class="form-control" id="empRole" required placeholder="e.g. Senior Strategist">
              </div>
              <div class="mb-3">
                <label for="empEmail" class="form-label">Email Address</label>
                <input type="email" class="form-control" id="empEmail" required placeholder="e.g. sarah.j@company.com">
              </div>
              <button type="submit" class="btn btn-primary w-100">Register Employee</button>
            </form>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="dummy-data.js"></script>
    <script>
      // Verify global scope dataset from dummy-data.js exists safely
      if (!window.__DUMMY_DATA__) window.__DUMMY_DATA__ = {};
      if (!window.__DUMMY_DATA__.employees) window.__DUMMY_DATA__.employees = [];

      // Theme context operations
      const themeToggleBtn = document.getElementById('themeToggleBtn');
      function applyTheme(isDark) {
        document.body.classList.toggle('dark-mode', isDark);
        localStorage.setItem('darkMode', isDark ? 'true' : 'false');
        if (themeToggleBtn) {
          themeToggleBtn.innerHTML = isDark ? '<i class="bi bi-sun-fill"></i>' : '<i class="bi bi-moon-fill"></i>';
        }
      }
      applyTheme(localStorage.getItem('darkMode') === 'true');
      themeToggleBtn?.addEventListener('click', () => applyTheme(!document.body.classList.contains('dark-mode')));

      // Responsive Navigation Toggle
      document
        .getElementById("mobile-toggle")
        ?.addEventListener("click", () => {
          document.getElementById("wrapper").classList.toggle("toggled");
        });

      // Topbar DateTime Sync Loop
      setInterval(() => {
        const now = new Date();
        const dateEl = document.querySelector("#topbarDatetime .t-date");
        const timeEl = document.querySelector("#topbarDatetime .t-time");
        if (dateEl) dateEl.textContent = now.toLocaleDateString();
        if (timeEl) timeEl.textContent = now.toLocaleTimeString();
      }, 1000);

      // Core UI Generation Engine
      function renderEmployees() {
        const table = document.getElementById("EmployeesTable");
        if (!table) return;
        
        table.innerHTML = ""; // Flushes live DOM workspace

        window.__DUMMY_DATA__.employees.forEach((emp, index) => {
          const tr = document.createElement("tr");
          tr.innerHTML = `
            <td><strong>${emp.name}</strong></td>
            <td>${emp.employeeId}</td>
            <td>${emp.department || '--'}</td>
            <td>${emp.position || '--'}</td>
            <td>${emp.contact || '--'}</td>
            <td class="text-end">
              <button class="btn btn-sm btn-outline-danger" onclick="deleteEmployee(${index})" title="Offboard Employee">
                <i class="bi bi-trash-fill"></i>
              </button>
            </td>
          `;
          table.appendChild(tr);
        });
      }

      // Add Record Event Interceptor
      document.getElementById("addEmployeeForm")?.addEventListener("submit", function(e) {
        e.preventDefault();

        // Object mapped perfectly to match dummy-data.js schema structure
        const newProfile = {
          employeeId: parseInt(document.getElementById("empId").value) || document.getElementById("empId").value,
          name: document.getElementById("empName").value,
          position: document.getElementById("empRole").value,
          department: document.getElementById("empDept").value,
          salary: 0, 
          employmentHistory: `Joined in ${new Date().getFullYear()}`,
          contact: document.getElementById("empEmail").value
        };

        window.__DUMMY_DATA__.employees.push(newProfile);
        renderEmployees();

        // Safe Framework Model dismissal
        this.reset();
        const modalElement = document.getElementById('addEmployeeModal');
        const modalInstance = bootstrap.Modal.getInstance(modalElement);
        modalInstance.hide();
      });

      // Array Deletion Logic
      window.deleteEmployee = function(index) {
        if (confirm("Are you certain you want to delete this employee profile from the master roster?")) {
          window.__DUMMY_DATA__.employees.splice(index, 1);
          renderEmployees();
        }
      };

      // Lifecycle load initialization 
      document.addEventListener("DOMContentLoaded", renderEmployees);
    </script>
  </body>
</html>
