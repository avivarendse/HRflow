<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HR Flow | Employees</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <script>
      if (localStorage.getItem("darkMode") === "true") {
        document.body.classList.add("dark-mode");
      }
    </script>

    <div id="wrapper">
      <!-- SIDEBAR (Matching Version 1) -->
      <aside id="sidebar">
        <div class="sidebar-header">
          <div class="sidebar-logo-box">
            <i class="bi bi-buildings-fill"></i>
          </div>
          <div class="sidebar-brand-text">
            <span class="brand-name">HR<span>Flow</span></span>
            <span class="brand-sub">Modern HR Platform</span>
          </div>
        </div>
        <ul class="sidebar-menu">
          <li class="sidebar-item">
            <a class="sidebar-link" href="dashboard.html"
              ><i class="bi bi-grid-1x2-fill"></i><span>Dashboard</span></a
            >
          </li>
          <li class="sidebar-item">
            <a class="sidebar-link active" href="employees.html"
              ><i class="bi bi-people-fill"></i><span>Employees</span></a
            >
          </li>
          <li class="sidebar-item">
            <a class="sidebar-link" href="payroll.html"
              ><i class="bi bi-cash-stack"></i><span>Payroll</span></a
            >
          </li>
          <li class="sidebar-item">
            <a class="sidebar-link" href="Performance.html"
              ><i class="bi bi-calendar-check"></i><span>Performance</span></a
            >
          </li>
          <li class="sidebar-item">
            <a class="sidebar-link" href="leave.html"
              ><i class="bi bi-calendar2-x"></i><span>Leave</span></a
            >
          </li>
          <li class="sidebar-item">
            <a class="sidebar-link" href="reports.html"
              ><i class="bi bi-bar-chart-line-fill"></i><span>Reports</span></a
            >
          </li>
          <li class="sidebar-item">
            <a class="sidebar-link" href="settings.html"
              ><i class="bi bi-gear-fill"></i><span>Settings</span></a
            >
          </li>
        </ul>
        <div class="sidebar-footer">
          <button id="sidebar-toggle-btn" class="sidebar-collapse-btn">
            <i class="bi bi-chevron-left"></i>
          </button>
        </div>
      </aside>

      <main id="page-content-wrapper">
        <div class="content-topbar">
          <div class="page-titles">
            <button
              class="btn btn-sm btn-custom-outline mobile-menu-btn mb-2"
              id="mobile-toggle"
            >
              <i class="bi bi-list"></i>
            </button>
            <h1>Employees</h1>
            <p>Manage employee records and departmental filters.</p>
          </div>
          <div class="topbar-tools">
            <div class="topbar-search">
              <i class="bi bi-search"></i>
              <input
                type="text"
                id="search-input"
                class="form-control"
                placeholder="Search employees..."
              />
            </div>
            <button
              class="theme-toggle-btn"
              id="themeToggleBtn"
              type="button"
              title="Toggle dark mode"
            >
              <i class="bi bi-moon-fill"></i>
            </button>
            <div class="topbar-datetime" id="topbarDatetime">
              <div class="t-date">--</div>
              <div class="t-time">--</div>
            </div>
          </div>
        </div>

        <div class="main-container">
          <div class="d-flex justify-content-between align-items-center mb-4">
            <div class="d-flex gap-2">
              <select
                class="form-select form-control-custom w-auto"
                id="department-filter"
              >
                <option value="">All Departments</option>
              </select>
            </div>
            <button class="btn btn-custom btn-custom-primary">
              + Add Employee
            </button>
          </div>

          <div class="card card-custom">
            <div class="card-body p-0">
              <!-- Remove padding for table to reach edges -->
              <div class="table-responsive">
                <table class="table custom-table-styles align-middle mb-0">
                  <thead>
                    <tr>
                      <th>Name</th>
                      <th>ID</th>
                      <th>Position</th>
                      <th>Department</th>
                      <th>Salary</th>
                      <th>Contact</th>
                    </tr>
                  </thead>
                  <tbody id="employee-table-body">
                    <!-- Data populated by employees.js -->
                  </tbody>
                </table>
              </div>
            </div>
          </div>

          <div class="d-flex gap-2 mt-4">
            <button class="btn btn-custom btn-custom-outline" id="btn-previous">
              Previous
            </button>
            <button class="btn btn-custom btn-custom-outline" id="btn-next">
              Next
            </button>
          </div>
        </div>
      </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
    <script src="dummy-data.js"></script>
    <script src="employees.js"></script>
    <script>
      const themeToggleBtn = document.getElementById("themeToggleBtn");
      function applyTheme(isDark) {
        document.body.classList.toggle("dark-mode", isDark);
        localStorage.setItem("darkMode", isDark ? "true" : "false");
        if (themeToggleBtn) {
          themeToggleBtn.innerHTML = isDark
            ? '<i class="bi bi-sun-fill"></i>'
            : '<i class="bi bi-moon-fill"></i>';
        }
      }
      applyTheme(localStorage.getItem("darkMode") === "true");
      themeToggleBtn?.addEventListener("click", () =>
        applyTheme(!document.body.classList.contains("dark-mode")),
      );

      setInterval(() => {
        const now = new Date();
        const dateEl = document.querySelector("#topbarDatetime .t-date");
        const timeEl = document.querySelector("#topbarDatetime .t-time");
        if (dateEl) dateEl.textContent = now.toLocaleDateString();
        if (timeEl) timeEl.textContent = now.toLocaleTimeString();
      }, 1000);

      document
        .getElementById("sidebar-toggle-btn")
        ?.addEventListener("click", () => {
          document.getElementById("wrapper").classList.toggle("toggled");
        });
      document
        .getElementById("mobile-toggle")
        ?.addEventListener("click", () => {
          document.getElementById("wrapper").classList.toggle("toggled");
        });
    </script>
  </body>
</html>
