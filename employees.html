<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="employees.css" rel = "stylesheet">
  <title>HRflow</title>
</head>

<body>

<div class="d-flex">

  <!-- ================= SIDEBAR (Bootstrap collapse on mobile) ================= -->
  <div class="collapse d-lg-block bg-light border-end vh-100 p-3"
       id="sidebar">

    <h5 class="fw-bold mb-4">HRflow</h5>

    <ul class="nav nav-pills flex-column gap-1">

      <li class="nav-item"><a class="nav-link" href="#">Dashboard</a></li>
      <li class="nav-item"><a class="nav-link active
        " href="employees.html">Employees</a></li>
      <li class="nav-item"><a class="nav-link" href="#">Payroll</a></li>
      <li class="nav-item"><a class="nav-link" href="#">Leave</a></li>
      <li class="nav-item"><a class="nav-link" href="#">Attendance</a></li>
      <li class="nav-item"><a class="nav-link" href="#">Reports</a></li>
      <li class="nav-item"><a class="nav-link" href="#">Settings</a></li>

    </ul>

  </div>

  <!-- ================= MAIN AREA ================= -->
  <div class="flex-grow-1">

    <!-- TOP BAR -->
    <nav class="navbar bg-body-tertiary border-bottom px-3">

      <!-- Burger (ONLY mobile) -->
      <button class="btn btn-outline-secondary d-lg-none"
              data-bs-toggle="collapse"
              data-bs-target="#sidebar">
        ☰
      </button>

      <!-- Search -->
      <form class="d-flex mx-auto w-50">
        <input class="form-control" type="search" placeholder="Search...">
      </form>

      <!-- Profile -->
      <div class="d-flex align-items-center gap-2">
        <span>User</span>
        <div class="rounded-circle bg-secondary" style="width:32px; height:32px;"></div>
      </div>

    </nav>

    <!-- PAGE CONTENT -->
    <main class="p-3">
      
      <div class="d-flex justify-content-between align-items-center mb-3">
        <div>
          <h1>Employees</h1>
          <h5>10 Employees</h5>
        </div>
        <button class="btn btn-primary">Add Employee</button>
      </div>

      <div class="card">
        <div class="card-body">
          
          <div class="d-flex gap-2 mb-3">
            <input class="form-control" type="search" id="search-input" placeholder="Search by name, ID, position, or department">
            <select class="form-select w-auto" id="department-filter">
              <option value="">All Departments</option>
            </select>
          </div>
          
          <table class="table">
            <thead>
              <tr>
                <th scope="col">Name</th>
                <th scope="col">ID</th>
                <th scope="col">Position</th>
                <th scope="col">Department</th>
                <th scope="col">Salary</th>
                <th scope="col">Contact</th>
              </tr>
            </thead>
            <tbody id="employee-table-body">

            </tbody>
          </table>
          
          <div class="d-flex gap-2 mt-3">
            <button class="btn btn-outline-secondary" id="btn-previous">Previous</button>
            <button class="btn btn-outline-secondary" id="btn-next">Next</button>
          </div>

        </div>
      </div>


    </main>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
<script src="dummy-data.js"></script>
<script src="employees.js"></script>

</body>
</html>
