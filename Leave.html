<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HRflow | Leave Request</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div id="wrapper">

    <!-- Sidebar -->
    <aside id="sidebar">

        <div class="sidebar-header">
            <div class="sidebar-logo-box">
                <i class="bi bi-buildings-fill"></i>
            </div>

            <div class="sidebar-brand-text">
                <span class="brand-name">HR<span>Flow</span></span>
                <span class="brand-sub">Modern HR Platform</span>
            </div>
        </div>

        <ul class="sidebar-menu">

            <li class="sidebar-item">
                <a class="sidebar-link" href="dashboard.html">
                    <i class="bi bi-grid-1x2-fill"></i>
                    <span>Dashboard</span>
                </a>
            </li>

            <li class="sidebar-item">
                <a class="sidebar-link" href="employees.html">
                    <i class="bi bi-people-fill"></i>
                    <span>Employees</span>
                </a>
            </li>

            <li class="sidebar-item">
                <a class="sidebar-link" href="attendance.html">
                    <i class="bi bi-calendar-check"></i>
                    <span>Attendance</span>
                </a>
            </li>

            <li class="sidebar-item">
                <a class="sidebar-link active" href="leave.html">
                    <i class="bi bi-calendar2-x"></i>
                    <span>Leave</span>
                </a>
            </li>

            <li class="sidebar-item">
                <a class="sidebar-link" href="payroll.html">
                    <i class="bi bi-cash-stack"></i>
                    <span>Payroll</span>
                </a>
            </li>

            <li class="sidebar-item">
                <a class="sidebar-link" href="reports.html">
                    <i class="bi bi-bar-chart-line-fill"></i>
                    <span>Reports</span>
                </a>
            </li>

            <li class="sidebar-item">
                <a class="sidebar-link" href="settings.html">
                    <i class="bi bi-gear-fill"></i>
                    <span>Settings</span>
                </a>
            </li>

        </ul>

        <div class="sidebar-footer"></div>
    </aside>

    <!-- Main Content -->
    <main id="page-content-wrapper">

        <!-- Topbar -->
        <div class="content-topbar">
            <div class="page-titles">
                <button
                    class="btn btn-sm btn-custom-outline mobile-menu-btn mb-2"
                    id="mobile-toggle">
                    <i class="bi bi-list"></i>
                </button>
                <h1>Leave Management</h1>
                <p>Submit and approve time-off requests.</p>
            </div>
            <div class="topbar-tools"></div>
        </div>

        <div class="main-container">

            <div class="row g-4">

                <!-- Form Column -->
                <div class="col-lg-5">

                    <div class="card card-custom">

                        <div class="card-body">

                            <h5 class="fw-bold mb-3 text-primary">
                                <i class="bi bi-send me-2"></i>
                                New Request
                            </h5>

                            <form id="leaveForm">

                                <div class="mb-3">
                                    <label class="form-label small fw-bold">
                                        Employee
                                    </label>

                                    <select class="form-select form-control-custom">
                                        <option>Sibongile Nkosi</option>
                                        <option>Lungile Moyo</option>
                                    </select>
                                </div>

                                <div class="row g-2 mb-3">

                                    <div class="col-6">
                                        <label class="form-label small fw-bold">
                                            Start Date
                                        </label>

                                        <input type="date" class="form-control form-control-custom">
                                    </div>

                                    <div class="col-6">
                                        <label class="form-label small fw-bold">
                                            End Date
                                        </label>

                                        <input type="date" class="form-control form-control-custom">
                                    </div>

                                </div>

                                <div class="mb-3">
                                    <label class="form-label small fw-bold">
                                        Reason
                                    </label>

                                    <textarea class="form-control form-control-custom" rows="3"></textarea>
                                </div>

                                <button type="submit" class="btn btn-custom btn-custom-primary w-100">
                                    Submit Request
                                </button>

                            </form>

                        </div>

                    </div>

                </div>

                <!-- Approval Queue -->
                <div class="col-lg-7">

                    <div class="card card-custom">

                        <div class="card-body">

                            <h5 class="fw-bold mb-3 text-primary">
                                <i class="bi bi-list-check me-2"></i>
                                Approval Queue
                            </h5>

                            <div id="requestList">
                                <!-- JavaScript inserts requests here -->
                            </div>

                        </div>

                    </div>

                </div>

            </div>

        </div>

    </main>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
<script src="data.js"></script>

<script>
document.getElementById("mobile-toggle")?.addEventListener("click", () => {
    document.getElementById("wrapper").classList.toggle("toggled");
});

(function renderLeave() {

    const list = document.getElementById("requestList");

    if (!list || !window.dummyData || !window.dummyData.leaveRequests) return;

    list.innerHTML = "";

    window.dummyData.leaveRequests.forEach((r) => {

        const item = document.createElement("div");

        item.className =
            "p-3 border rounded mb-2 d-flex justify-content-between align-items-center";

        item.innerHTML = `
            <div>
                <div class="fw-bold">${r.name}</div>
                <div class="text-muted small">${r.type} · ${r.date}</div>
            </div>

            <div class="d-flex gap-2">
                <button class="btn btn-sm btn-outline-danger">
                    Reject
                </button>

                <button class="btn btn-sm btn-custom-primary">
                    Approve
                </button>
            </div>
        `;

        list.appendChild(item);

    });

})();
</script>

</body>

</html>
