<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HR Flow | Leave Management</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <script>
      if (localStorage.getItem("darkMode") === "true") {
        document.body.classList.add("dark-mode");
      }
    </script>
    <div id="wrapper">
      <aside id="sidebar">
        <div class="sidebar-header">
          <div class="sidebar-logo-box">
            <i class="bi bi-buildings-fill"></i>
          </div>
          <div class="sidebar-brand-text">
            <span class="brand-name">HR<span>Flow</span></span>
            <span class="brand-sub">Modern HR Platform</span>
          </div>
        </div>
        <ul class="sidebar-menu">
          <li class="sidebar-item">
            <a class="sidebar-link" href="dashboard.html"
              ><i class="bi bi-grid-1x2-fill"></i><span>Dashboard</span></a
            >
          </li>
          <li class="sidebar-item">
            <a class="sidebar-link" href="employees.html"
              ><i class="bi bi-people-fill"></i><span>Employees</span></a
            >
          </li>
          <li class="sidebar-item">
            <a class="sidebar-link" href="payroll.html"
              ><i class="bi bi-cash-stack"></i><span>Payroll</span></a
            >
          </li>
          <li class="sidebar-item">
            <a class="sidebar-link" href="Performance.html"
              ><i class="bi bi-calendar-check"></i><span>Performance</span></a
            >
          </li>
          <li class="sidebar-item">
            <a class="sidebar-link active" href="leave.html"
              ><i class="bi bi-calendar2-x"></i><span>Leave</span></a
            >
          </li>
          <li class="sidebar-item">
            <a class="sidebar-link" href="reports.html"
              ><i class="bi bi-bar-chart-line-fill"></i><span>Reports</span></a
            >
          </li>
          <li class="sidebar-item">
            <a class="sidebar-link" href="settings.html"
              ><i class="bi bi-gear-fill"></i><span>Settings</span></a
            >
          </li>
        </ul>
        <div class="sidebar-footer">
          <button
            id="sidebar-toggle-btn"
            class="sidebar-collapse-btn"
            title="Toggle Sidebar"
          >
            <i class="bi bi-chevron-left"></i>
          </button>
        </div>
      </aside>

      <main id="page-content-wrapper">
        <div class="content-topbar">
          <div class="page-titles">
            <button
              class="btn btn-sm btn-custom-outline mobile-menu-btn mb-2"
              id="mobile-toggle"
            >
              <i class="bi bi-list"></i>
            </button>
            <h1>Leave Management</h1>
            <p>Submit and approve time-off requests.</p>
          </div>
          <div class="topbar-tools">
            <button
              class="theme-toggle-btn"
              id="themeToggleBtn"
              type="button"
              title="Toggle dark mode"
            >
              <i class="bi bi-moon-fill"></i>
            </button>
            <div class="topbar-datetime" id="topbarDatetime">
              <div class="t-date">--</div>
              <div class="t-time">--</div>
            </div>
          </div>
        </div>

        <div class="main-container">
          <div class="row g-4">
            <div class="col-lg-5">
              <div class="card card-custom">
                <div class="card-body">
                  <h5 class="fw-bold mb-3 text-primary">
                    <i class="bi bi-send me-2"></i>New Request
                  </h5>
                  <form id="leaveForm">
                    <div class="mb-3">
                      <label class="form-label small fw-bold">Employee</label>
                      <select
                        class="form-select form-control-custom"
                        id="leaveEmpSelect"
                      ></select>
                    </div>
                    <div class="row g-2 mb-3">
                      <div class="col-6">
                        <label class="form-label small fw-bold"
                          >Start Date</label
                        >
                        <input
                          type="date"
                          class="form-control form-control-custom"
                        />
                      </div>
                      <div class="col-6">
                        <label class="form-label small fw-bold">End Date</label>
                        <input
                          type="date"
                          class="form-control form-control-custom"
                        />
                      </div>
                    </div>
                    <div class="mb-3">
                      <label class="form-label small fw-bold">Reason</label>
                      <textarea
                        class="form-control form-control-custom"
                        rows="3"
                      ></textarea>
                    </div>
                    <button
                      type="submit"
                      class="btn btn-custom btn-custom-primary w-100"
                    >
                      Submit Request
                    </button>
                  </form>
                </div>
              </div>
            </div>

            <div class="col-lg-7">
              <div class="card card-custom">
                <div class="card-body">
                  <h5 class="fw-bold mb-3 text-primary">
                    <i class="bi bi-list-check me-2"></i>Approval Queue
                  </h5>
                  <div id="requestList"></div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </main>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
    <script src="dummy-data.js"></script>
    <script>
      const themeToggleBtn = document.getElementById("themeToggleBtn");
      function applyTheme(isDark) {
        document.body.classList.toggle("dark-mode", isDark);
        localStorage.setItem("darkMode", isDark ? "true" : "false");
        if (themeToggleBtn) {
          themeToggleBtn.innerHTML = isDark
            ? '<i class="bi bi-sun-fill"></i>'
            : '<i class="bi bi-moon-fill"></i>';
        }
      }
      applyTheme(localStorage.getItem("darkMode") === "true");
      themeToggleBtn?.addEventListener("click", () =>
        applyTheme(!document.body.classList.contains("dark-mode")),
      );

      document
        .getElementById("sidebar-toggle-btn")
        ?.addEventListener("click", () => {
          document.getElementById("wrapper").classList.toggle("toggled");
        });
      document
        .getElementById("mobile-toggle")
        ?.addEventListener("click", () => {
          document.getElementById("wrapper").classList.toggle("toggled");
        });

      document.addEventListener("DOMContentLoaded", function () {
        const data = window.__DUMMY_DATA__ || {};
        const empSelect = document.getElementById("leaveEmpSelect");
        const list = document.getElementById("requestList");

        // Fixed target parsing reference below
        if (data.Performance && empSelect) {
          data.Performance.forEach((emp) => {
            let opt = new Option(emp.name, emp.employeeId);
            empSelect.add(opt);
          });
        }

        setInterval(() => {
          const now = new Date();
          const dateEl = document.querySelector("#topbarDatetime .t-date");
          const timeEl = document.querySelector("#topbarDatetime .t-time");
          if (dateEl) dateEl.textContent = now.toLocaleDateString();
          if (timeEl) timeEl.textContent = now.toLocaleTimeString();
        }, 1000);

        if (list && data.Performance) {
          list.innerHTML = "";
          data.Performance.forEach((record) => {
            if (record.leaveRequests) {
              record.leaveRequests.forEach((req) => {
                const item = document.createElement("div");
                item.className =
                  "p-3 border rounded mb-2 d-flex justify-content-between align-items-center";
                item.innerHTML = `
                  <div>
                    <div class="fw-bold">${record.name}</div>
                    <div class="text-muted small">${req.reason} · ${req.date} (${req.status})</div>
                  </div>
                  <div class="d-flex gap-2">
                    <button class="btn btn-sm btn-outline-danger">Reject</button>
                    <button class="btn btn-sm btn-custom-primary">Approve</button>
                  </div>`;
                list.appendChild(item);
              });
            }
          });
        }
      });
    </script>
  </body>
</html>
