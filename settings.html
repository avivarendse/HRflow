<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HR Flow | Settings</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <script>
      if (localStorage.getItem("darkMode") === "true") {
        document.body.classList.add("dark-mode");
      }
    </script>
    <div id="wrapper">
      <aside id="sidebar">
        <div class="sidebar-header">
          <div class="sidebar-logo-box">
            <i class="bi bi-buildings-fill"></i>
          </div>
          <div class="sidebar-brand-text">
            <span class="brand-name">HR<span>Flow</span></span>
            <span class="brand-sub">Modern HR Platform</span>
          </div>
        </div>
        <ul class="sidebar-menu">
          <li class="sidebar-item">
            <a class="sidebar-link" href="dashboard.html"
              ><i class="bi bi-grid-1x2-fill"></i><span>Dashboard</span></a
            >
          </li>
          <li class="sidebar-item">
            <a class="sidebar-link" href="employees.html"
              ><i class="bi bi-people-fill"></i><span>Employees</span></a
            >
          </li>
          <li class="sidebar-item">
            <a class="sidebar-link" href="payroll.html"
              ><i class="bi bi-cash-stack"></i><span>Payroll</span></a
            >
          </li>
          <li class="sidebar-item">
            <a class="sidebar-link" href="Performance.html"
              ><i class="bi bi-calendar-check"></i><span>Performance</span></a
            >
          </li>
          <li class="sidebar-item">
            <a class="sidebar-link" href="leave.html"
              ><i class="bi bi-calendar2-x"></i><span>Leave</span></a
            >
          </li>
          <li class="sidebar-item">
            <a class="sidebar-link" href="reports.html"
              ><i class="bi bi-bar-chart-line-fill"></i><span>Reports</span></a
            >
          </li>
          <li class="sidebar-item">
            <a class="sidebar-link active" href="settings.html"
              ><i class="bi bi-gear-fill"></i><span>Settings</span></a
            >
          </li>
        </ul>
        <div class="sidebar-footer">
          <button id="sidebar-toggle-btn" class="sidebar-collapse-btn">
            <i class="bi bi-chevron-left"></i>
          </button>
        </div>
      </aside>

      <main id="page-content-wrapper">
        <div class="content-topbar">
          <div class="page-titles">
            <button
              class="btn btn-sm btn-custom-outline mobile-menu-btn mb-2"
              id="mobile-toggle"
            >
              <i class="bi bi-list"></i>
            </button>
            <h1>System Settings</h1>
            <p>Manage HR configuration and security.</p>
          </div>
          <div class="topbar-tools">
            <button
              class="theme-toggle-btn"
              id="themeToggleBtn"
              type="button"
              title="Toggle dark mode"
            >
              <i class="bi bi-moon-fill"></i>
            </button>
            <div class="topbar-datetime" id="topbarDatetime">
              <div class="t-date">--</div>
              <div class="t-time">--</div>
            </div>
          </div>
        </div>

        <div class="main-container">
          <div class="row g-4">
            <div class="col-lg-4">
              <div class="card card-custom profile-card text-center p-4">
                <img
                  src="https://ui-avatars.com/api/?name=HR+Admin&background=12766b&color=fff&size=128"
                  alt="profile"
                />
                <h4 class="fw-bold mt-3">HR Administrator</h4>
                <p class="text-muted mb-1">ModernTech Solutions</p>
              </div>
            </div>

            <div class="col-lg-8">
              <div class="card card-custom mb-4">
                <div class="card-body">
                  <h5 class="fw-bold mb-3">
                    <i class="bi bi-gear-fill text-primary"></i> General
                    Settings
                  </h5>
                  <div class="row g-3">
                    <div class="col-md-6">
                      <label class="form-label">Company Name</label
                      ><input
                        type="text"
                        id="companyName"
                        class="form-control form-control-custom"
                      />
                    </div>
                    <div class="col-md-6">
                      <label class="form-label">Company Email</label
                      ><input
                        type="email"
                        id="companyEmail"
                        class="form-control form-control-custom"
                      />
                    </div>
                  </div>
                </div>
              </div>

              <div class="card card-custom mb-4">
                <div class="card-body">
                  <h5 class="fw-bold mb-3">
                    <i class="bi bi-sliders text-primary"></i> Preferences
                  </h5>
                  <div class="form-check form-switch mb-3">
                    <input
                      class="form-check-input form-switch-custom"
                      type="checkbox"
                      id="notifications"
                      checked
                    />
                    <label class="form-check-label ms-2"
                      >Enable Notifications</label
                    >
                  </div>
                  <div class="form-check form-switch">
                    <input
                      class="form-check-input form-switch-custom"
                      type="checkbox"
                      id="darkMode"
                    />
                    <label class="form-check-label ms-2">Dark Mode</label>
                  </div>
                </div>
              </div>

              <div class="card card-custom mb-4">
                <div class="card-body">
                  <h5 class="fw-bold mb-3">
                    <i class="bi bi-shield-lock text-primary"></i> Security
                  </h5>
                  <div class="mb-3">
                    <label class="form-label">New Password</label
                    ><input
                      type="password"
                      id="newPassword"
                      class="form-control form-control-custom"
                    />
                  </div>
                  <div>
                    <label class="form-label">Confirm Password</label
                    ><input
                      type="password"
                      id="confirmPassword"
                      class="form-control form-control-custom"
                    />
                  </div>
                </div>
              </div>

              <div class="d-flex justify-content-end gap-2">
                <button id="resetBtn" class="btn btn-custom btn-custom-outline">
                  <i class="bi bi-arrow-counterclockwise"></i> Reset
                </button>
                <button id="saveBtn" class="btn btn-custom btn-custom-primary">
                  <i class="bi bi-check-circle"></i> Save Changes
                </button>
              </div>
            </div>
          </div>
        </div>
      </main>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
    <script src="dummy-data.js"></script>
    <script src="settings.js"></script>
    <script>
      document.addEventListener("DOMContentLoaded", function () {
        const themeToggleBtn = document.getElementById("themeToggleBtn");
        function applyTheme(isDark) {
          document.body.classList.toggle("dark-mode", isDark);
          localStorage.setItem("darkMode", isDark ? "true" : "false");
          if (themeToggleBtn) {
            themeToggleBtn.innerHTML = isDark
              ? '<i class="bi bi-sun-fill"></i>'
              : '<i class="bi bi-moon-fill"></i>';
          }
        }
        applyTheme(localStorage.getItem("darkMode") === "true");
        themeToggleBtn?.addEventListener("click", () =>
          applyTheme(!document.body.classList.contains("dark-mode")),
        );

        const wrapper = document.getElementById("wrapper");
        const desktopToggle = document.getElementById("sidebar-toggle-btn");
        const mobileToggle = document.getElementById("mobile-toggle");
        if (desktopToggle)
          desktopToggle.addEventListener("click", () =>
            wrapper.classList.toggle("toggled"),
          );
        if (mobileToggle)
          mobileToggle.addEventListener("click", () =>
            wrapper.classList.toggle("toggled"),
          );

        function updateClock() {
          const now = new Date();
          const dateEl = document.querySelector("#topbarDatetime .t-date");
          const timeEl = document.querySelector("#topbarDatetime .t-time");
          if (dateEl) dateEl.textContent = now.toLocaleDateString();
          if (timeEl) timeEl.textContent = now.toLocaleTimeString();
        }
        updateClock();
        setInterval(updateClock, 1000);
      });
    </script>
  </body>
</html>
