<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HRflow | Settings</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <script>
      // Enforce login security boundary control
      if (sessionStorage.getItem("isAuthenticated") !== "true") {
        window.location.href = "login.html";
      }
      if (localStorage.getItem("darkMode") === "true") {
        document.body.classList.add("dark-mode");
      }
    </script>
    <div id="wrapper">
      <aside id="sidebar">
        <div class="sidebar-header">
          <div class="sidebar-logo-box">
            <i class="bi bi-buildings-fill"></i>
          </div>
          <div class="sidebar-brand-text">
            <span class="brand-name">HR<span>Flow</span></span>
            <span class="brand-sub">Modern HR Platform</span>
          </div>
        </div>
        <ul class="sidebar-menu">
          <li class="sidebar-item">
            <a class="sidebar-link" href="dashboard.html">
              <i class="bi bi-grid-1x2-fill"></i><span>Dashboard</span>
            </a>
          </li>
          <li class="sidebar-item">
            <a class="sidebar-link" href="employees.html">
              <i class="bi bi-people-fill"></i><span>Employees</span>
            </a>
          </li>
          <li class="sidebar-item">
            <a class="sidebar-link" href="payroll.html">
              <i class="bi bi-cash-stack"></i><span>Payroll</span>
            </a>
          </li>
          <li class="sidebar-item">
            <a class="sidebar-link" href="performance.html">
              <i class="bi bi-calendar-check"></i><span>Performance</span>
            </a>
          </li>
          <li class="sidebar-item">
            <a class="sidebar-link" href="leave.html">
              <i class="bi bi-calendar2-x"></i><span>Leave</span>
            </a>
          </li>
          <li class="sidebar-item">
            <a class="sidebar-link" href="reports.html">
              <i class="bi bi-bar-chart-line-fill"></i><span>Reports</span>
            </a>
          </li>
          <li class="sidebar-item">
            <a class="sidebar-link active" href="settings.html">
              <i class="bi bi-gear-fill"></i><span>Settings</span>
            </a>
          </li>
          <li class="sidebar-item mt-auto">
            <a class="sidebar-link text-danger" href="#" id="logoutBtn">
              <i class="bi bi-box-arrow-left"></i><span>Log Out</span>
            </a>
          </li>
        </ul>
      </aside>

      <main id="page-content-wrapper">
        <div class="content-topbar">
          <div class="page-titles">
            <button class="btn btn-sm btn-custom-outline mobile-menu-btn mb-2" id="mobile-toggle">
              <i class="bi bi-list"></i>
            </button>
            <h1>System Settings</h1>
            <p>Configure workspace environments and system global controls.</p>
          </div>
        </div>

        <div class="main-container">
          <div class="card card-custom mb-4">
            <div class="card-body">
              <h5 class="fw-bold mb-4 text-primary">Company Profile</h5>
              <div class="row g-3">
                <div class="col-md-6">
                  <label class="form-label small fw-semibold">Company Name</label>
                  <input type="text" id="companyName" class="form-control" />
                </div>
                <div class="col-md-6">
                  <label class="form-label small fw-semibold">HR Contact Email</label>
                  <input type="email" id="companyEmail" class="form-control" />
                </div>
              </div>
            </div>
          </div>

          <div class="card card-custom mb-4">
            <div class="card-body">
              <h5 class="fw-bold mb-4 text-primary">Security & Preferences</h5>
              <div class="row g-3 mb-4">
                <div class="col-md-6">
                  <label class="form-label small fw-semibold">New Password</label>
                  <input type="password" id="newPassword" class="form-control" placeholder="Leave blank to keep current" />
                </div>
                <div class="col-md-6">
                  <label class="form-label small fw-semibold">Confirm Password</label>
                  <input type="password" id="confirmPassword" class="form-control" placeholder="Leave blank to keep current" />
                </div>
              </div>
              <div class="form-check form-switch mb-3">
                <input class="form-check-input" type="checkbox" id="notifications" />
                <label class="form-check-label small" for="notifications">Enable system email alerts</label>
              </div>
              <div class="form-check form-switch">
                <input class="form-check-input" type="checkbox" id="darkMode" />
                <label class="form-check-label small" for="darkMode">Interface Dark Display Theme</label>
              </div>
            </div>
          </div>

          <div class="d-flex gap-3">
            <button id="saveBtn" class="btn btn-primary px-4">Save Changes</button>
            <button id="resetBtn" class="btn btn-outline-secondary">Reset Defaults</button>
          </div>
        </div>
      </main>
    </div>
    <!-- Custom Professional Dialog Modal Container -->
<div class="modal fade" id="hrflowModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered" style="max-width: 400px;">
    <div class="modal-content border-0 shadow">
      <div class="modal-body text-center p-4">
        <div id="modalIcon" class="mb-3 fs-1 text-primary"></div>
        <h5 id="modalTitle" class="fw-bold mb-2">Notification</h5>
        <p id="modalMessage" class="text-muted small mb-4"></p>
        <div class="d-flex justify-content-center gap-2">
          <button type="button" id="modalCancelBtn" class="btn btn-sm btn-outline-secondary px-3 d-none" data-bs-dismiss="modal">Cancel</button>
          <button type="button" id="modalConfirmBtn" class="btn btn-sm btn-primary px-4" data-bs-dismiss="modal">Confirm</button>
        </div>
      </div>
    </div>
  </div>
</div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="settings.js"></script>
    <script>
      // Handle mobile view toggles locally 
      document.getElementById("mobile-toggle")?.addEventListener("click", () => {
        document.getElementById("wrapper").classList.toggle("toggled");
      });
    </script>
  </body>
</html>
