<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HRflow | Sign In</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        /* Custom authentication container wrapper */
        .auth-wrapper {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-color, #f8f9fa);
            padding: 20px;
        }
        .auth-card {
            max-width: 420px;
            width: 100%;
            border: none;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.05);
            background: var(--card-bg, #ffffff);
        }
        body.dark-mode .auth-card {
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
        }
        .auth-logo-box {
            width: 50px;
            height: 50px;
            background: var(--primary-color, #4361ee);
            color: white;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            margin: 0 auto 15px auto;
        }
    </style>
</head>
<body>
    <script>
        // Synchronize dark mode before document paints
        if (localStorage.getItem("darkMode") === "true") {
            document.body.classList.add("dark-mode");
        }
    </script>

    <div class="auth-wrapper">
        <div class="card auth-card p-4 p-sm-5">
            <div class="text-center mb-4">
                <div class="auth-logo-box">
                    <i class="bi bi-buildings-fill"></i>
                </div>
                <h3 class="fw-bold mb-1">Welcome Back</h3>
                <p class="text-muted small">Sign in to manage your HRflow terminal</p>
            </div>

            <div id="loginAlert" class="alert alert-danger d-none small py-2" role="alert">
                <i class="bi bi-exclamation-triangle-fill me-2"></i> Invalid username or password.
            </div>

            <form id="loginForm">
                <div class="mb-3">
                    <label for="usernameInput" class="form-label small fw-semibold">Username / Email</label>
                    <div class="input-group">
                        <span class="input-group-text bg-transparent border-end-0 text-muted">
                            <i class="bi bi-person"></i>
                        </span>
                        <input type="text" class="form-control border-start-0 ps-0" id="usernameInput" required placeholder="admin" autocomplete="username">
                    </div>
                </div>

                <div class="mb-4">
                    <label for="passwordInput" class="form-label small fw-semibold">Password</label>
                    <div class="input-group">
                        <span class="input-group-text bg-transparent border-end-0 text-muted">
                            <i class="bi bi-lock"></i>
                        </span>
                        <input type="password" class="form-control border-start-0 ps-0" id="passwordInput" required placeholder="••••••••" autocomplete="current-password">
                    </div>
                </div>

                <div class="d-flex justify-content-between align-items-center mb-4 small">
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" id="rememberMe">
                        <label class="form-check-input-label text-muted" for="rememberMe">
                            Remember me
                        </label>
                    </div>
                    <a href="#" class="text-decoration-none text-primary">Forgot Password?</a>
                </div>

                <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold">
                    <i class="bi bi-box-arrow-in-right me-2"></i> Sign In
                </button>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const username = document.getElementById('usernameInput').value.trim();
            const password = document.getElementById('passwordInput').value.trim();
            const alertBox = document.getElementById('loginAlert');

            // Default fallback credentials matching system architecture standards
          
            if (username === 'admin' && password === 'admin123') {
                alertBox.classList.add('d-none');
                
                // Track authenticated session state
                sessionStorage.setItem('isAuthenticated', 'true');
                
                // Smooth routing execution to target system UI interface
                window.location.href = 'dashboard.html';
            } else {
                // Flash alert interface block
                alertBox.classList.remove('d-none');
            }
        });
    </script>
</body>
</html>
